<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZOO LANDING</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../../assets/components/components.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header id="header-root"></header>

    <main>
        <section class="hero-section">
            <div class="hero-container">
                <h1>Watch your favorite animal online</h1>
                <p>
                    Explore the exciting and mysterious world of
                    wild animals in a natural setting without
                    leaving your home.
                </p>
                <button class="btnToLiveCam">
                    VIEW LIVE CAM &rarr;
                </button>
            </div>
        </section>
    </main>


    <template id="welcome-popup">
        <div class="popup-overlay" data-popup-overlay>
            <div class="welcome-popup-container">
                <button class="popup-close" data-popup-close>
                    <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 30 30" fill="none">
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M29.5599 2.56066C30.1457 1.97487 30.1457 1.02512 29.5599 0.439337C28.9741 -0.146448 28.0243 -0.146445 27.4386 0.439343L14.9997 12.8783L2.56112 0.439648C1.97534 -0.14614 1.02559 -0.146143 0.4398 0.439642C-0.145987 1.02543 -0.14599 1.97517 0.439795 2.56096L12.8784 14.9996L0.439337 27.4387C-0.146448 28.0245 -0.146445 28.9743 0.439343 29.56C1.02513 30.1458 1.97488 30.1458 2.56066 29.56L14.9997 17.1209L27.439 29.5603C28.0248 30.1461 28.9745 30.1461 29.5603 29.5604C30.1461 28.9746 30.1461 28.0248 29.5603 27.439L17.121 14.9996L29.5599 2.56066Z" fill="white"/>
                    </svg>
                </button>

                <img src="../../assets/images/pop1.png" alt="">

                <h2>TOGETHER WE CARE, SAVE AND PROTECT!</h2>
                <p>
                    Your most generous gift not only cares for countless animals,
                    but it also offers hope and a vital lifeline to the world’s most
                    endangered wildlife relying on us to survive.
                </p>

                <div class="popup1-btns">
                    <button data-amount="20">$20</button>
                    <button data-amount="30">$30</button>
                    <button data-amount="50">$50</button>
                    <button data-amount="80">$80</button>
                    <button data-amount="100">$100</button>
                    <button data-amount="OTHER" class="otherBtn">OTHER AMOUNT</button>
                </div>
            </div>
        </div>
    </template>

    <script src="script.js" defer></script>
</body>

</html>
